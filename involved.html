<!-- HERO -->
<section class="hero d-flex align-items-center text-center" style="height: 50vh;">
  <div class="container">
    <h1 class="hero-title">Get Involved</h1>
    <p class="hero-subtitle">Join our programs and take your game to the next level.</p>
  </div>
</section>

<!-- FORM SECTION -->
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">

        <div class="p-4 shadow rounded bg-white">
          <h3 class="mb-4 text-center">Join a Program</h3>

          <form>

            <!-- Name -->
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" placeholder="Enter your name" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <!-- Program -->
            <div class="mb-3">
              <label class="form-label">Select Program</label>
              <select class="form-select" required>
                <option value="">Choose...</option>
                <option>Technical Training</option>
                <option>Fitness & Conditioning</option>
                <option>Game Intelligence</option>
              </select>
            </div>

            <!-- Message -->
            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="4" placeholder="Tell us about your goals"></textarea>
            </div>

            <!-- Submit -->
            <div class="text-center">
              <button type="submit" class="btn btn-primary hero-btn">Submit</button>
            </div>

          </form>

        </div>

      </div>
    </div>
  </div>
</section>
